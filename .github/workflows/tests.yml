name: API Tests CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Ручной запуск

jobs:
  test:
    name: Run API Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
      fail-fast: false  # Не останавливать все при ошибке в одной версии

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-github-actions-annotate-failures  # Красивые ошибки в PR

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 api/ tests/ utils/ models/ --max-line-length=120 --ignore=E203,W503

      - name: Check formatting with black
        run: |
          pip install black
          black --check api/ tests/ utils/ models/ --line-length 100

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short --disable-warnings

      - name: Upload test results
        if: always()  # Загружаем даже при падении тестов
        uses: actions/upload-artifact@v4
        with:
          name: test-results-python${{ matrix.python-version }}
          path: |
            reports/
            .pytest_cache/
          retention-days: 7

      - name: Generate Allure Report
        if: always()
        run: |
          pip install allure-pytest
          pytest tests/ --alluredir=allure-results --clean-alluredir

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-python${{ matrix.python-version }}
          path: allure-results/
          retention-days: 7

  # Отдельная джоба для отправки уведомлений (опционально)
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: test
    if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Check test status
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "✅ Все тесты прошли успешно!"
          else
            echo "❌ Тесты упали!"
            exit 1
          fi