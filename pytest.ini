[pytest]
# Путь к тестам
testpaths = tests

# Параметры запуска по умолчанию
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:cacheprovider

# Маркеры для тестов
markers =
    smoke: Быстрая проверка основного функционала
    regression: Полный набор регрессионных тестов
    negative: Негативные тесты (ошибки, граничные случаи)
    pet: Тесты для Pet эндпоинтов
    store: Тесты для Store эндпоинтов
    user: Тесты для User эндпоинтов
    slow: Медленные тесты (загрузка файлов и т.д.)

# Настройки логирования
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S

# Настройки фильтрации
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Таймаут для тестов (в секундах)
timeout = 30

